<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safezen International Agency</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #0a0f1a;
      margin: 0;
      padding: 0;
    }

    .phone-wrapper {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #0d1b2a;
      position: relative;
      overflow: hidden;
      padding-bottom: 40px;
    }

    /* Full-page blurred blob background */
    .bg-image {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.75;
    }
    .blob-1 {
      width: 320px; height: 320px;
      background: #1a9e5c;
      top: -80px; left: -80px;
    }
    .blob-2 {
      width: 280px; height: 280px;
      background: #f57c00;
      top: 60px; right: -60px;
    }
    .blob-3 {
      width: 260px; height: 260px;
      background: #1565c0;
      top: 320px; left: -40px;
    }
    .blob-4 {
      width: 300px; height: 300px;
      background: #6a1b9a;
      top: 480px; right: -80px;
    }
    .blob-5 {
      width: 250px; height: 250px;
      background: #00838f;
      bottom: 80px; left: 30px;
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 20, 35, 0.45);
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 0;
      gap: 0;
    }

    .logo {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 6px;
  text-decoration: none;
}
.logo-img {
  width: 160px;
  height: auto;
  object-fit: contain;
}

    .agency-name {
      font-size: 19px;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin-bottom: 4px;
    }

    .tagline {
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      text-align: center;
      margin-bottom: 22px;
      letter-spacing: 0.2px;
    }

    /* Social icons row */
    .socials {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }

    .social-btn {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }
    .social-btn:hover {
      transform: translateY(-3px) scale(1.07);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .social-btn svg { width: 26px; height: 26px; }

    .btn-youtube  { background: #fff; }
    .btn-wechat   { background: #fff; }
    .btn-whatsapp { background: #fff; }
    .btn-facebook { background: #fff; }

    /* Person cards */
    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      display: block;
      width: 100%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 16px 22px;
      text-decoration: none;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      background: rgba(255,255,255,0.2);
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 3px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
    }

    /* Contact Us card */
    .contact-card {
      display: block;
      width: 100%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 14px 22px;
      text-decoration: none;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 16px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .contact-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      background: rgba(255,255,255,0.2);
    }
    .contact-label {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
    }

    /* Address */
    .address {
      width: 100%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 14px 22px;
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: 13.5px;
      line-height: 1.7;
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.15);
    }
	/* Extra mobile optimization */
    @media (max-width: 420px) {
      .phone-wrapper {
        max-width: 100%;
        border-radius: 0;
        box-shadow: none;
      }
  </style>
</head>
